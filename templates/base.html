<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Program tábora{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .slot-header { background: #343a40; color: #fff; border-radius: 6px 6px 0 0; padding: .4rem .8rem; font-size: .85rem; font-weight: 600; }
    .slot-block { border: 1px solid #dee2e6; border-radius: 0 0 6px 6px; margin-bottom: 1rem; background: #fff; }
    .troop-row { padding: .25rem .8rem; border-bottom: 1px solid #f0f0f0; display: flex; align-items: stretch; gap: .5rem; flex-wrap: nowrap; font-size: .83rem; overflow: hidden; }
    .troop-row:last-child { border-bottom: none; }
    .troop-row > * { align-self: flex-start; flex-shrink: 0; }
    .troop-row .flex-grow-1 { flex-shrink: 1; min-width: 0; }
    .troop-badge { display: inline-block; width: 5px; border-radius: 2px; align-self: stretch; min-height: 1.2rem; flex-shrink: 0; }
    .meal-banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: .35rem .8rem; margin-bottom: .5rem; font-size: .82rem; }
    .game-row { background: #e8f4fd; border: 1px solid #90caf9; border-radius: 6px; padding: .5rem .8rem; margin-bottom: .5rem; font-size: .88rem; }
    .service-row { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 6px; padding: .5rem .8rem; margin-bottom: .5rem; }
    .cancelled-overlay { opacity: .4; }
    .colour-swatch { display: flex; flex-wrap: wrap; gap: 4px; }
    .colour-swatch span { width: 28px; height: 28px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; display: inline-block; }
    .colour-swatch span.selected, .colour-swatch span:hover { border-color: #000; }
    .day-nav { display: flex; gap: .5rem; align-items: center; }
    .intensity-badge { font-size: .72rem; padding: .15rem .4rem; border-radius: 10px; }
    .intensity-nizka  { background: #c8e6c9; color: #1b5e20; }
    .intensity-stredni{ background: #fff9c4; color: #f57f17; }
    .intensity-vysoka { background: #ffcdd2; color: #b71c1c; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('index') }}"><i class="bi bi-calendar2-week me-1"></i>Program tábora</a>
    <div class="d-flex gap-2 align-items-center">
      {% if session.get('is_admin') %}
        <a href="{{ url_for('admin') }}" class="btn btn-sm btn-warning"><i class="bi bi-gear-fill"></i> Admin</a>
      {% endif %}
      <a href="{{ url_for('help_page') }}" class="btn btn-sm btn-outline-light"><i class="bi bi-question-circle me-1"></i>Nápověda</a>
      <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right"></i> Odhlásit</a>
    </div>
  </div>
</nav>
<div class="container-fluid px-3">
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show py-2" role="alert">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
