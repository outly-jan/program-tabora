<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Přihlášení – Program tábora</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh">
<div class="card shadow" style="width:100%;max-width:360px">
  <div class="card-body p-4">
    <h4 class="card-title text-center mb-4">🏕️ Program tábora</h4>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Heslo</label>
        <input type="password" name="password" class="form-control form-control-lg"
               autofocus autocomplete="current-password" placeholder="Zadej heslo">
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Vstoupit</button>
    </form>
  </div>
</div>
</body>
</html>
